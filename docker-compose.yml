services:
  mysql:
    image: mysql:8.0
    container_name: seniorcare_mysql
    restart: always
    environment:
      MYSQL_DATABASE: seniorcare_db
      MYSQL_USER: seniorcare_user
      MYSQL_PASSWORD: seniorcare_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: seniorcare_backend
    restart: always
    env_file:
      - ./backend/.env.example
    ports:
      - "8000:8000"
    depends_on:
      - mysql

  frontend:
    build: ./frontend
    container_name: seniorcare_frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mysql_data:
